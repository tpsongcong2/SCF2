<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SCF — Quản lý công ty</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/dist/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pri:#2d6a4f;--pri2:#52b788;--pri3:#1b4332;--acc:#f8c30f;--bg:#f0f4f1;--bg2:#e8f0ec;--card:#fff;--tx:#1a2e22;--tx2:#4a6358;--bd:rgba(0,0,0,.1);--bd2:rgba(0,0,0,.18);--sb-w:230px;--r:8px;--rl:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:14px}
input,select,textarea{background:#fff;border:.5px solid var(--bd2);border-radius:var(--r);padding:8px 10px;outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--pri)}
button{cursor:pointer;border:.5px solid var(--bd2);border-radius:var(--r);background:#fff;padding:7px 14px;color:var(--tx);transition:.15s;display:inline-flex;align-items:center;gap:5px}
button:hover{background:var(--bg2)}
.bp{background:var(--pri)!important;color:#fff!important;border:none!important;font-weight:500}.bp:hover{background:var(--pri3)!important}
.bi{background:none;border:none;padding:4px;color:var(--tx2)}.bi:hover{background:var(--bg2)}
.bdel{background:none;border:.5px solid #F7C1C1;color:#A32D2D;padding:4px 10px;font-size:12px}.bdel:hover{background:#FCEBEB}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px}
.card{background:var(--card);border:.5px solid var(--bd);border-radius:var(--rl);padding:1.25rem}
.sc{background:var(--bg2);border-radius:var(--r);padding:.85rem 1rem}
.fl{margin-bottom:.85rem}.fl label{display:block;font-size:12px;color:var(--tx2);margin-bottom:4px;font-weight:500}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 1rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 1rem}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0 1rem}
.tw{background:#fff;border:.5px solid var(--bd);border-radius:var(--rl);overflow:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;color:var(--tx2);font-weight:500;font-size:12px;background:var(--bg2);white-space:nowrap;border-bottom:.5px solid var(--bd)}
td{padding:9px 12px;border-top:.5px solid var(--bd);vertical-align:middle}
.empty-st{padding:3rem;text-align:center;color:var(--tx2)}
.layout{display:flex;min-height:100vh}
.sb{width:var(--sb-w);background:var(--pri3);color:#e8f0ec;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:width .25s;overflow:hidden}
.sb.col{width:58px}
.sb-head{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;border-bottom:.5px solid rgba(255,255,255,.1);flex-shrink:0}
.sb-logo{width:34px;height:34px;flex-shrink:0;border-radius:4px}
.sb-ttl{font-size:15px;font-weight:600;white-space:nowrap;color:#fff;overflow:hidden}
.sb-tog{margin-left:auto;background:none;border:none;color:rgba(255,255,255,.6);padding:4px;cursor:pointer;flex-shrink:0;border-radius:4px}
.sb-tog:hover{color:#fff;background:rgba(255,255,255,.1)}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-sec{font-size:10px;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.8px;padding:10px 16px 4px;white-space:nowrap}
.sb.col .sb-sec{display:none}
.sb-btn{display:flex;align-items:center;gap:10px;padding:9px 14px;color:rgba(255,255,255,.75);cursor:pointer;transition:.15s;white-space:nowrap;border:none;background:none;width:100%;text-align:left;border-radius:0}
.sb-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-btn.on{background:rgba(255,255,255,.12);color:#fff;border-left:3px solid var(--acc)}
.sb-btn i{font-size:17px;flex-shrink:0}
.sb-btn span{font-size:13px;overflow:hidden}
.sb.col .sb-btn span{display:none}
.sb.col .sb-btn{padding:9px 0;justify-content:center}
.main{flex:1;margin-left:var(--sb-w);transition:margin-left .25s;min-height:100vh;display:flex;flex-direction:column}
.main.exp{margin-left:58px}
.topbar{background:#fff;border-bottom:.5px solid var(--bd);padding:0 1.5rem;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.content{flex:1;padding:1.5rem;max-width:1200px;width:100%}
.ptitle{font-size:18px;font-weight:600;color:var(--pri3);margin-bottom:1.25rem;display:flex;align-items:center;gap:8px}
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1b4332 0%,#2d6a4f 50%,#1a3a2a 100%)}
.login-card{background:#fff;border-radius:16px;padding:2.5rem;width:380px;max-width:95vw}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:36px}
.pw-eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;padding:4px;color:var(--tx2);cursor:pointer}
.welcome-grid{display:grid;grid-template-columns:1fr 360px;gap:1.25rem;align-items:start}
.greet{background:linear-gradient(135deg,var(--pri) 0%,var(--pri2) 100%);border-radius:var(--rl);padding:1.5rem;color:#fff;margin-bottom:1.25rem}
.weather-card{background:#fff;border:.5px solid var(--bd);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem}
.cal-card{background:#fff;border:.5px solid var(--bd);border-radius:var(--rl);padding:1rem}
.cal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-dhd{font-size:11px;font-weight:600;color:var(--tx2);padding:3px 0}
.cal-d{font-size:12px;padding:5px 2px;border-radius:4px}
.cal-d.today{background:var(--pri);color:#fff;font-weight:600;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;margin:0 auto}
.cal-d.dim{color:#ccc}
.scene{background:#fff;border:.5px solid var(--bd);border-radius:var(--rl);overflow:hidden}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:9999;padding:1rem}
.modal{background:#fff;border-radius:var(--rl);border:.5px solid var(--bd);width:580px;max-width:100%;max-height:92vh;overflow-y:auto;padding:1.5rem}.modal.wide{width:900px;max-width:98vw}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.mh h2{font-size:17px;font-weight:500}
.mclose{background:none;border:none;font-size:20px;color:var(--tx2);padding:4px;line-height:1}
.divider{border:none;border-top:.5px solid var(--bd);margin:.75rem 0}
.load-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:12px}
.chip-admin{background:#EDE9FE;color:#5B21B6}.chip-manager{background:#E6F1FB;color:#185FA5}
.chip-staff{background:#EAF3DE;color:#3B6D11}.chip-driver{background:#FAEEDA;color:#854F0B}
.ptrow{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg2);border-radius:var(--r);margin-bottom:6px}
.wip-badge{font-size:9px;margin-left:4px;opacity:.5}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.pill{padding:4px 12px;font-size:12px;border-radius:20px;cursor:pointer;transition:.15s}
.pill.on{background:var(--pri);color:#fff;border-color:var(--pri);font-weight:500}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}
.sb-nav::-webkit-scrollbar{width:4px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.search-wrap{position:relative;display:inline-block}
.search-wrap i{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--tx2);pointer-events:none}
.search-wrap input{padding-left:30px;width:200px}
@media(max-width:768px){.welcome-grid{grid-template-columns:1fr}.g2,.g3,.g4{grid-template-columns:1fr}}
</style>
</head>

function useLS(key,init){
  const[v,sv]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init}catch{return init}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(v))}catch{}},[key,v]);
  return[v,sv];
}
async function dbGet(key,def){if(!sb)return def;try{const{data}=await sb.from('kv_store').select('value').eq('key',key).maybeSingle();return data?.value??def;}catch{return def;}}

function mkSet(key,setter){return valOrFn=>{setter(prev=>{const next=typeof valOrFn==='function'?valOrFn(prev):valOrFn;dbSet(key,next);return next;});};}

/* ─── EXCEL helpers ─── */
function xlsxExport(rows,cols,filename){
  const data=rows.map(r=>Object.fromEntries(cols.map(([k,l])=>[l,r[k]??''])));
  const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Data');
  XLSX.writeFile(wb,filename+'_'+fmtDate().replace(/\//g,'-')+'.xlsx');
}
function xlsxImport(file,cb){
  const r=new FileReader();
  r.onload=e=>{const wb=XLSX.read(e.target.result,{type:'binary'});cb(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]))};
  r.readAsBinaryString(file);
}
function ExportBtn({onClick}){return h('button',{onClick,style:{fontSize:12,padding:'6px 12px'}},h('i',{className:'ti ti-file-spreadsheet',style:{fontSize:14}}),'Xuất Excel');}
function ImportBtn({onFile}){
  const ref=useRef();
  return h('span',null,
    h('input',{type:'file',accept:'.xlsx,.xls',ref,style:{display:'none'},onChange:e=>{if(e.target.files[0]){xlsxImport(e.target.files[0],onFile);e.target.value='';}}},),
    h('button',{onClick:()=>ref.current.click(),style:{fontSize:12,padding:'6px 12px'}},h('i',{className:'ti ti-upload',style:{fontSize:14}}),'Nhập Excel')
  );
}

function BirthdayScene({name}){
  const ref=useRef(null);
  useEffect(()=>{
    const c=ref.current;if(!c)return;
    const ctx=c.getContext('2d');c.width=c.offsetWidth;c.height=260;
    const W=c.width,H=c.height;const pts=[];
    const colors=['#f8c30f','#ff6b35','#e94560','#52b788','#93c5fd','#fff','#f472b6'];
    function mkFw(x,y){for(let i=0;i<55;i++){const a=(i/55)*Math.PI*2,sp=2+Math.random()*4;pts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color:colors[i%colors.length],sz:1.5+Math.random()*2});}}
    const lps=[{x:W*.25,y:H*.3},{x:W*.5,y:H*.18},{x:W*.75,y:H*.32},{x:W*.4,y:H*.22},{x:W*.6,y:H*.12}];
    let li=0,fr=0;
    const loop=()=>{fr++;ctx.fillStyle='rgba(10,20,15,.13)';ctx.fillRect(0,0,W,H);
      if(fr%30===0&&li<lps.length){mkFw(lps[li].x,lps[li].y);li++;}
      if(li>=lps.length&&fr%55===0){li=0;pts.length=0;}
      for(let i=pts.length-1;i>=0;i--){const p=pts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.life-=.018;if(p.life<=0){pts.splice(i,1);continue;}ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();}
      ctx.globalAlpha=1;ctx.fillStyle='rgba(248,195,15,.92)';ctx.font='bold 17px sans-serif';ctx.textAlign='center';
      ctx.fillText('🎂 Chúc mừng sinh nhật '+name+'! 🎉',W/2,H-18);requestAnimationFrame(loop);};
    const t=setInterval(()=>{if(li<lps.length){mkFw(lps[li].x,lps[li].y);li++;}},500);
    loop();return()=>clearInterval(t);
  },[]);
  return h('div',{className:'scene'},h('canvas',{ref,style:{display:'block',width:'100%',height:260,background:'#0a140f'}}));
}

/* ─── SMART PRODUCT IMPORT ─── */
function SmartImportModal({prodCats,onImport,onClose}) {
  const [txt,stxt] = useState('');
  const [preview,sp] = useState([]);

  const parseStr = s => {
    s = s.trim();
    if (!s) return null;
    const parts = s.split(',');
    // Last part = unit
    const unit = parts[parts.length-1].trim();
    // Remove last part
    let rest = parts.slice(0,-1);
    // Remove known prefixes at start
    const skipPfx = ['VD_QV','VD','SEV'];
    while (rest.length && skipPfx.includes(rest[0].trim())) rest.shift();
    // Remove 'SÔNG CÔNG' anywhere
    rest = rest.filter(p => p.trim() !== 'SÔNG CÔNG' && p.trim() !== 'SONG CONG');
    const name = rest.join(',').trim();
    if (!name) return null;
    return {name, unit: unit || 'Kg'};
  };

  const parse = () => {
    const lines = txt.split(/\n|\s{2,}/).map(l=>l.trim()).filter(Boolean);
    const seen = new Set();
    const rows = [];
    lines.forEach(l => {
      const r = parseStr(l);
      if (r && !seen.has(r.name+'|'+r.unit)) {
        seen.add(r.name+'|'+r.unit);
        rows.push(r);
      }
    });
    sp(rows);
  };

  return h(Modal,{title:'Nhập nhanh sản phẩm từ danh sách',lg:true,onClose},
    h('div',{style:{fontSize:13,color:'var(--tx2)',marginBottom:8}},
      'Dán danh sách vào ô bên dưới. Mỗi sản phẩm 1 dòng. Định dạng hỗ trợ: ',
      h('code',{style:{background:'var(--bg2)',padding:'1px 5px',borderRadius:3,fontSize:12}},'BÁNH PHỞ TƯƠI,3KG/PAC'),
      ' hoặc ',
      h('code',{style:{background:'var(--bg2)',padding:'1px 5px',borderRadius:3,fontSize:12}},'VD,BÚN TƯƠI,SÔNG CÔNG,KG')
    ),
    h('textarea',{value:txt,onChange:e=>{stxt(e.target.value);sp([]);},
      placeholder:'Dán danh sách sản phẩm vào đây...',
      style:{width:'100%',minHeight:150,fontSize:13,fontFamily:'monospace',padding:8,borderRadius:'var(--r)',border:'1px solid var(--bd)',resize:'vertical',boxSizing:'border-box'}
    }),
    h('div',{style:{display:'flex',gap:8,margin:'8px 0'}},
      h('button',{className:'bp',onClick:parse},h('i',{className:'ti ti-wand',style:{fontSize:14,marginRight:4}}),'Phân tích danh sách'),
      preview.length>0&&h('span',{style:{fontSize:13,color:'var(--pri)',alignSelf:'center'}},
        '✓ Tìm thấy '+preview.length+' sản phẩm (đã loại trùng)'
      )
    ),
    preview.length>0&&h('div',null,
      h('div',{className:'tw',style:{maxHeight:300,overflowY:'auto'}},
        h('table',null,
          h('thead',null,h('tr',null,
            h('th',null,'#'),h('th',null,'Tên sản phẩm'),h('th',null,'Đơn vị')
          )),
          h('tbody',null,preview.map((r,i)=>h('tr',{key:i},
            h('td',null,h('span',{style:{color:'var(--tx2)',fontSize:11}},i+1)),
            h('td',null,h('span',{style:{fontWeight:500}},r.name)),
            h('td',null,h('span',{className:'badge sbadge'},r.unit))
          )))
        )
      ),
      h(Row,{style:{marginTop:'1rem'}},
        h('button',{onClick:onClose},'Hủy'),
        h('button',{className:'bp',onClick:()=>{
          onImport(preview);onClose();
        },style:{padding:'8px 20px'}},
          h('i',{className:'ti ti-file-plus',style:{fontSize:14}}),' Nhập '+preview.length+' sản phẩm'
        )
      )
    ),
    preview.length===0&&h(Row,null,h('button',{onClick:onClose},'Hủy'))
  );
}

function parseProductStr(s){
  if(!s) return {name:'',unit:'Kg'};
  const parts=s.toString().split(',');
  const unit=parts[parts.length-1].trim();
  let rest=parts.slice(0,-1);
  const skip=['VD_QV','VD','SEV'];
  while(rest.length&&skip.includes(rest[0].trim())) rest.shift();
  rest=rest.filter(p=>{
    const u=p.trim().toUpperCase().replace(/\s+/g,'');
    return !['SÔNGCÔNG','SONGCONG','SONGCÔNG','SÔNGCONG'].includes(u);
  });
  return {name:rest.join(',').trim(), unit:unit||'Kg'};
}

function addDays(dateStr, n) {
  if(!dateStr) return '';
  const [d,m,y] = dateStr.split('/');
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() + n);
  return String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0')+'/'+dt.getFullYear();
}

function PrintTemplateModal({order, company, onClose}) {
  const [tpl, setTpl] = useState('welstory');
  const doPrint = () => {
    if(tpl==='welstory'){
      try {
        // Read with styles + VBA preserved
        const wb = XLSX.read(WEL_TEMPLATE_B64, {type:'base64', cellStyles:true, bookVBA:true});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const lines = (order.lines||[]).filter(l=>l.productName);
        const co = company||{};

        // Helper: chỉ cập nhật giá trị, giữ nguyên style
        const setVal = (addr, val, type) => {
          if(ws[addr]) { ws[addr].v = val; delete ws[addr].w; ws[addr].t = type||'s'; }
          else ws[addr] = {v: val, t: type||'s'};
        };

        // Header info
        setVal('C8', order.customer||'');
        setVal('C9', order.pointName||order.address||'');
        setVal('C10', order.deliveryDate||'');
        setVal('C11', order.deliveryTime||'');
        setVal('M10', addDays(order.deliveryDate,-1));
        if(co.name) setVal('B4', co.name);
        if(co.address) setVal('B5', co.address);

        // Template có sẵn 2 dòng sp (14,15), Tổng ở 16
        // Dùng dòng 14 làm mẫu style cho các dòng thêm
        const TMPL_ROW = 14;
        const TMPL_COLS = ['B','C','D','E','F','G','H','I','J','K','L','M','N','O','P'];
        const startRow = 14;
        const numLines = lines.length;

        // Copy style từ row mẫu cho các dòng extra
        const copyRowStyle = (fromRow, toRow) => {
          TMPL_COLS.forEach(c => {
            const src = ws[c+fromRow];
            if(src) {
              const dst = {v:'', t:'s'};
              if(src.s) dst.s = src.s;
              ws[c+toRow] = dst;
            }
          });
          if(!ws['!rows']) ws['!rows']=[];
          while(ws['!rows'].length < toRow) ws['!rows'].push(null);
          ws['!rows'][toRow-1] = {hpt:46.5};
        };

        // Đảm bảo đủ dòng trong sheet
        for(let i=2; i<numLines; i++) copyRowStyle(TMPL_ROW, startRow+i);

        // Điền dữ liệu từng dòng SP
        lines.forEach((l, i) => {
          const r = startRow + i;
          setVal('B'+r, i+1, 'n');
          setVal('C'+r, l.productName||'');
          setVal('D'+r, Number(l.qtyInvoice||0), 'n');
          setVal('E'+r, '');
          setVal('F'+r, l.unit||'Kg');
        });

        // Xóa các dòng thừa trong template (nếu ít hơn 2 dòng)
        for(let i=numLines; i<2; i++) {
          const r = startRow+i;
          ['B','C','D','E','F'].forEach(c => { if(ws[c+r]) { ws[c+r].v=''; delete ws[c+r].w; }});
        }

        // Dòng Tổng: đẩy xuống sau dòng cuối
        const totRow = startRow + numLines;
        const origTotRow = startRow + 2; // row 16 trong template
        if(totRow !== origTotRow) {
          // Copy style dòng Tổng từ 16 xuống vị trí mới
          TMPL_COLS.forEach(c => {
            const src = ws[c+origTotRow];
            if(src) { ws[c+totRow] = {...src, v: src.v, w: undefined}; }
            if(totRow !== origTotRow && ws[c+origTotRow]) { ws[c+origTotRow].v=''; delete ws[c+origTotRow].w; }
          });
        }
        const totQty = lines.reduce((s,l)=>s+Number(l.qtyInvoice||0),0);
        setVal('B'+totRow, 'Tổng');
        setVal('D'+totRow, totQty, 'n');
        setVal('E'+totRow, '');

        // Cập nhật range
        const range = XLSX.utils.decode_range(ws['!ref']||'A1:P20');
        range.e.r = Math.max(range.e.r, totRow+4);
        ws['!ref'] = XLSX.utils.encode_range(range);

        const fname = 'PhieuGiaoHang_'+(order.pointName||order.id).replace(/\s+/g,'_')+'_'+order.deliveryDate.replace(/\//g,'-')+'.xlsx';
        XLSX.writeFile(wb, fname, {bookType:'xlsx', type:'binary'});
      } catch(e) {
        alert('Lỗi xuất Excel: '+e.message);
        console.error(e);
      }
      return;
    }
    const html = buildPrintHTML(tpl, order, company);
    const w = window.open('','_blank','width='+Math.round(screen.availWidth*0.9)+',height='+Math.round(screen.availHeight*0.9)+',left='+Math.round(screen.availWidth*0.05)+',top='+Math.round(screen.availHeight*0.05)+',resizable=yes,scrollbars=yes');
    w.document.write(html);
    w.document.close();
    setTimeout(() => { w.print(); }, 500);
  };
  return h(Modal,{title:'In phiếu giao hàng',onClose},
    h(F,{label:'Chọn mẫu in'},
      h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
        PRINT_TEMPLATES.map(t=>h('label',{key:t.id,style:{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderRadius:'var(--r)',border:'1.5px solid '+(tpl===t.id?'var(--pri)':'var(--bd)'),cursor:'pointer',background:tpl===t.id?'var(--bg2)':''},onClick:()=>setTpl(t.id)},
          h('input',{type:'radio',checked:tpl===t.id,readOnly:true,style:{width:'auto'}}),
          h('span',{style:{fontWeight:tpl===t.id?600:400}},t.name)
        ))
      )
    ),
    h('div',{style:{background:'var(--bg2)',borderRadius:'var(--r)',padding:'10px 14px',fontSize:13,margin:'8px 0'}},
      h('div',{style:{fontWeight:500,marginBottom:4}},'Thông tin đơn:'),
      h('div',null,'📍 ',order.pointName||'—', ' | 📅 ',order.deliveryDate||'—',' | ⏰ ',order.deliveryTime||'—'),
      h('div',null,'📦 ',(order.lines||[]).length,' mặt hàng — KH: ',order.customer||'—')
    ),
    h(Row,null,
      h('button',{onClick:onClose},'Hủy'),
      h('button',{className:'bp',onClick:doPrint,style:{padding:'8px 20px'}},
        h('i',{className:'ti ti-printer',style:{fontSize:14}}),' In phiếu'
      )
    )
  );
}

function Sidebar({page,setPage,col,setCol,company,role,perms}){
  const [collapsed,setCollapsed]=useState({});
  const toggleSec=sec=>setCollapsed(p=>({...p,[sec]:!p[sec]}));
  return h('nav',{className:'sb'+(col?' col':'')},
    h('div',{className:'sb-head'},
      h('img',{src:LOGO_SRC,className:'sb-logo'}),
      !col&&h('span',{className:'sb-ttl'},company&&company.name||'SCF'),
      h('button',{className:'sb-tog',onClick:()=>setCol(c=>!c)},h('i',{className:'ti '+(col?'ti-layout-sidebar-right':'ti-layout-sidebar'),style:{fontSize:18}}))
    ),
    h('div',{className:'sb-nav'},
      (()=>{
        const els=[]; let curSec=null;
        NAV.forEach((item,i)=>{
          if(item.sec){
            const nextItems=NAV.slice(i+1).filter((x,j)=>{const ni=NAV.slice(i+1);const si=ni.findIndex(y=>y.sec);return si<0||j<si;});
            if(!nextItems.some(x=>canAccess(role,x.key,perms)))return;
            curSec=item.sec;
            const isCol=collapsed[curSec];
            els.push(h('div',{key:'sec'+i,className:'sb-sec',style:{cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',paddingRight:col?0:12},onClick:()=>!col&&toggleSec(curSec)},
              h('span',null,item.sec),
              !col&&h('i',{className:'ti ti-chevron-'+(isCol?'right':'down'),style:{fontSize:11,opacity:.6}})
            ));
            return;
          }
          if(!canAccess(role,item.key,perms))return;
          if(curSec&&collapsed[curSec]&&!col)return; // hidden when section collapsed
          els.push(h('button',{key:item.key,className:'sb-btn'+(page===item.key?' on':''),onClick:()=>setPage(item.key),title:col?item.label:undefined},
            h('i',{className:'ti '+item.icon,style:{fontSize:17}}),
            h('span',null,item.label,item.wip?h('span',{className:'wip-badge'},'...'):null)
          ));
        });
        return els;
      })()
    )
  );
}

  const[un,su]=useState('');const[pw,sp]=useState('');const[show,ss]=useState(false);const[err,se]=useState('');
  const submit=()=>{const u=employees.find(e=>e.username===un&&e.password===pw);if(u)onLogin(u);else se('Tên đăng nhập hoặc mật khẩu không đúng!');};
  return h('div',{className:'login-bg'},

        h('div',{className:'pw-wrap'},
          h('input',{type:show?'text':'password',value:pw,onChange:e=>{sp(e.target.value);se('');},onKeyDown:e=>e.key==='Enter'&&submit()}),
          h('button',{className:'pw-eye',onClick:()=>ss(s=>!s)},h('i',{className:'ti ti-eye'+(show?'-off':''),style:{fontSize:15}}))

    )
  );
}

function StatusBadge({s}){
  const map={pending:['#FAEEDA','#854F0B','Chờ giao'],delivering:['#EAF3DE','#3B6D11','Đang giao'],done:['#E1F5EE','#0F6E56','Đã giao'],cancelled:['#FCEBEB','#A32D2D','Hủy'],planning:['#E6F1FB','#185FA5','Lên kế hoạch'],active:['#EAF3DE','#3B6D11','Đang giao'],completed:['#E1F5EE','#0F6E56','Hoàn thành'],draft:['#F1EFE8','#5F5E5A','Nháp'],sent:['#E6F1FB','#185FA5','Đã gửi'],approved:['#EAF3DE','#3B6D11','Đã duyệt'],expired:['#F1EFE8','#6b6b67','Hết hạn']};
  const[bg,tx,label]=map[s]||['#F1EFE8','#5F5E5A',s];
  return h('span',{className:'badge',style:{background:bg,color:tx}},label);
}

// Input số có định dạng dấu phẩy hàng nghìn (8,700 / 50,000)
function NumInput({value, onChange, style, placeholder}) {
  const fmt = v => (v || v===0) ? Number(v).toLocaleString('en-US') : '';
  const [disp, setDisp] = useState(fmt(value));
  useEffect(function(){ setDisp(fmt(value)); }, [value]);
  return h('input', {
    type:'text', inputMode:'numeric',
    value: disp,
    placeholder: placeholder||'0',
    style: style||{},
    onChange: function(e) {
      var raw = e.target.value.replace(/[^0-9]/g,'');
      setDisp(raw ? Number(raw).toLocaleString('en-US') : '');
      onChange(raw ? Number(raw) : 0);
    }
  });
}

function QuoteForm({quote,customers,products,currentUser,onSave,onClose}){
  const today=new Date().toISOString().slice(0,10);
  const toInput=s=>{if(!s)return'';const[d,m,y]=s.split('/');return y+'-'+m+'-'+d;};
  const fromInput=s=>{if(!s)return'';const[y,m,d]=s.split('-');return d+'/'+m+'/'+y;};
  const[f,sf]=useState(quote?{...quote,dateFromI:toInput(quote.dateFrom),dateToI:toInput(quote.dateTo)}:{customerId:'',customer:'',dateFromI:today,dateToI:'',status:'draft',note:'',lines:[]});
  const s=(k,v)=>sf(p=>({...p,[k]:v}));
  const setCust=cid=>{const c=customers.find(x=>x.id===cid);sf(p=>({...p,customerId:cid,customer:c?c.name:''}));};
  const addLine=()=>sf(p=>({...p,lines:[...p.lines,{id:uid(),productId:'',productName:'',unit:'',price:0}]}));
  const updLine=(id,data)=>sf(p=>({...p,lines:p.lines.map(l=>l.id===id?data:l)}));
  const delLine=id=>sf(p=>({...p,lines:p.lines.filter(l=>l.id!==id)}));
  const submit=()=>{
    if(!f.pointId){alert('Chọn địa điểm giao!');return;}
    if(f.lines.length===0){alert('Thêm ít nhất 1 sản phẩm!');return;}
    onSave({...f,dateFrom:fromInput(f.dateFromI),dateTo:fromInput(f.dateToI),createdBy:quote?quote.createdBy:currentUser.name,createdAt:quote?quote.createdAt:fmtDate(),updatedBy:currentUser.name,updatedAt:fmtDT()});
  };
  return h(Modal,{title:quote?'Sửa báo giá '+quote.id:'Tạo báo giá mới',onClose},
    h('div',{className:'g2'},
      h(F,{label:'Khách hàng *'},h('select',{value:f.customerId,onChange:e=>setCust(e.target.value)},
        h('option',{value:''},'— Chọn khách hàng —'),customers.map(c=>h('option',{key:c.id,value:c.id},c.name))
      )),
      h(F,{label:'Trạng thái'},h('select',{value:f.status,onChange:e=>s('status',e.target.value)},
        [['draft','Nháp'],['sent','Đã gửi'],['approved','Đã duyệt'],['expired','Hết hạn'],['cancelled','Hủy']].map(([v,l])=>h('option',{key:v,value:v},l))
      )),
    ),
    h('div',{className:'g2'},
      h(F,{label:'Ngày bắt đầu'},h('input',{type:'date',value:f.dateFromI,onChange:e=>s('dateFromI',e.target.value)})),
      h(F,{label:'Ngày kết thúc'},h('input',{type:'date',value:f.dateToI,onChange:e=>s('dateToI',e.target.value)})),
    ),
    h('div',{className:'divider'}),
    h('div',{style:{fontWeight:500,fontSize:13,marginBottom:8,color:'var(--pri3)'}},'Bảng giá sản phẩm'),
    h('div',{style:{display:'grid',gridTemplateColumns:'2fr 1fr 1fr auto',gap:6,marginBottom:4}},
      h('span',{style:{fontSize:11,color:'var(--tx2)',fontWeight:500}},'Sản phẩm'),
      h('span',{style:{fontSize:11,color:'var(--tx2)',fontWeight:500}},'Đơn vị'),
      h('span',{style:{fontSize:11,color:'var(--tx2)',fontWeight:500}},'Đơn giá (đ)'),
      h('span',null,'')
    ),
    f.lines.map(l=>h(QuoteLineRow,{key:l.id,line:l,products,onChange:data=>updLine(l.id,data),onRemove:()=>delLine(l.id)})),
    h('button',{onClick:addLine,style:{fontSize:12,padding:'5px 12px',marginBottom:8}},h('i',{className:'ti ti-plus',style:{fontSize:13,marginRight:4}}),'Thêm sản phẩm'),
    h(F,{label:'Ghi chú'},h('textarea',{value:f.note,onChange:e=>s('note',e.target.value),rows:2})),
    h(Row,null,h('button',{onClick:onClose},'Hủy'),h('button',{className:'bp',onClick:submit,style:{padding:'8px 20px'}},h('i',{className:'ti ti-device-floppy',style:{fontSize:14}}),'Lưu báo giá'))
  );
}

function OrderDetailLine({line,products,onChange,onRemove}){
  const prod=products.find(p=>p.id===line.productId)||{};
  return h('div',{style:{display:'grid',gridTemplateColumns:'3fr 90px 90px 70px 100px 32px',gap:6,alignItems:'end',marginBottom:6,padding:'8px 10px',background:'var(--bg2)',borderRadius:'var(--r)'}},
    h('div',null,
      h('div',{style:{fontSize:11,color:'var(--tx2)',marginBottom:3}},'Sản phẩm'),
      h('select',{value:line.productId,onChange:e=>{const p=products.find(x=>x.id===e.target.value)||{};onChange({...line,productId:e.target.value,productName:p.name||'',unit:p.unit||'',weightPerUnit:p.weightPerUnit||0});},style:{fontSize:13,width:'100%'}},
        h('option',{value:''},'— Chọn SP —'),products.map(p=>h('option',{key:p.id,value:p.id},p.name))
      )
    ),
    h('div',null,
      h('div',{style:{fontSize:11,color:'var(--tx2)',marginBottom:3}},'SL SX'),
      h('input',{type:'number',min:0,value:line.qtyProd,onChange:e=>onChange({...line,qtyProd:numFmt(e.target.value)}),style:{fontSize:13}})
    ),
    h('div',null,
      h('div',{style:{fontSize:11,color:'var(--tx2)',marginBottom:3}},'SL HĐ'),
      h('input',{type:'number',min:0,value:line.qtyInvoice,onChange:e=>onChange({...line,qtyInvoice:numFmt(e.target.value)}),style:{fontSize:13}})
    ),
    h('div',null,
      h('div',{style:{fontSize:11,color:'var(--tx2)',marginBottom:3}},'ĐVT'),
      h('input',{value:prod.unit||line.unit||'',readOnly:true,style:{fontSize:13,background:'var(--card)',cursor:'default',textAlign:'center'}})
    ),
    h('div',null,
      h('div',{style:{fontSize:11,color:'var(--tx2)',marginBottom:3}},'Ca SX'),
      h('select',{value:line.shift||'day',onChange:e=>onChange({...line,shift:e.target.value}),style:{fontSize:13}},
        h('option',{value:'day'},'Ca ngày'),h('option',{value:'night'},'Ca đêm')
      )
    ),
    h('button',{className:'bi',onClick:onRemove,style:{color:'#A32D2D',alignSelf:'flex-end',marginBottom:2}},h('i',{className:'ti ti-trash',style:{fontSize:15}}))
  );
}

function PrintModal({order,company,onClose}){
  return h('div',{className:'overlay',onClick:e=>{if(e.target===e.currentTarget)onClose()}},
    h('div',{style:{background:'#fff',borderRadius:'var(--rl)',width:700,maxWidth:'95vw',maxHeight:'92vh',overflow:'auto',padding:'2rem'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'1.5rem'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:12}},
          h('img',{src:LOGO_SRC,style:{width:50,height:50}}),
          h('div',null,
            h('div',{style:{fontSize:16,fontWeight:700,color:'var(--pri3)'}},company&&company.name||'Công ty SCF'),
            company&&company.address&&h('div',{style:{fontSize:12,color:'var(--tx2)'}},company.address),
            company&&company.phone&&h('div',{style:{fontSize:12,color:'var(--tx2)'}},'ĐT: '+company.phone)
          )
        ),
        h('div',{style:{textAlign:'right'}},
          h('div',{style:{fontSize:20,fontWeight:700,color:'var(--pri3)'}},'HÓA ĐƠN GIAO HÀNG'),
          h('div',{style:{fontSize:13,color:'var(--tx2)'}},order.id),
          order.invoiceNo&&h('div',{style:{fontSize:12,color:'var(--tx2)'}},'Số HĐ: '+order.invoiceNo)
        )
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,background:'var(--bg2)',padding:'12px 16px',borderRadius:'var(--r)',marginBottom:'1.5rem',fontSize:13}},
        h('div',null,h('b',null,'Khách hàng: '),order.customer),
        h('div',null,h('b',null,'Ngày giao: '),order.deliveryDate+(order.deliveryTime?' lúc '+order.deliveryTime:'')),
        h('div',{style:{gridColumn:'1/-1'}},h('b',null,'Địa chỉ: '),order.address||order.pointName||'—')
      ),
      h('table',{style:{width:'100%',borderCollapse:'collapse',marginBottom:'1rem',fontSize:13}},
        h('thead',null,h('tr',{style:{background:'var(--pri3)',color:'#fff'}},
          ...[['STT','40px'],['Tên sản phẩm',''],['Đơn vị','80px'],['SL sản xuất','100px'],['SL hóa đơn','100px'],['Ca SX','80px']].map(([c,w])=>h('th',{key:c,style:{padding:'8px 10px',textAlign:'left',width:w||'auto'}},c))
        )),
        h('tbody',null,(order.lines||[]).map((l,i)=>h('tr',{key:l.id,style:{borderBottom:'.5px solid var(--bd)',background:i%2?'var(--bg2)':'#fff'}},
          h('td',{style:{padding:'7px 10px'}},(i+1)),
          h('td',{style:{padding:'7px 10px',fontWeight:500}},l.productName||'—'),
          h('td',{style:{padding:'7px 10px'}},l.unit||'—'),
          h('td',{style:{padding:'7px 10px',textAlign:'center'}},l.qtyProd||0),
          h('td',{style:{padding:'7px 10px',textAlign:'center'}},l.qtyInvoice||0),
          h('td',{style:{padding:'7px 10px'}},l.shift==='night'?'Ca đêm':'Ca ngày')
        )))
      ),
      order.note&&h('div',{style:{fontSize:13,marginBottom:'1rem'}},h('b',null,'Ghi chú: '),order.note),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:20,marginTop:'2rem',fontSize:12,textAlign:'center'}},
        h('div',null,h('div',{style:{borderTop:'.5px solid #333',paddingTop:8,fontWeight:500}},'Người giao hàng'),h('div',{style:{color:'var(--tx2)'}},'(Ký và ghi rõ họ tên)')),
        h('div',null,h('div',{style:{borderTop:'.5px solid #333',paddingTop:8,fontWeight:500}},'Người nhận hàng'),h('div',{style:{color:'var(--tx2)'}},'(Ký và ghi rõ họ tên)')),
        h('div',null,h('div',{style:{borderTop:'.5px solid #333',paddingTop:8,fontWeight:500}},'Xác nhận công ty'),h('div',{style:{color:'var(--tx2)'}},'(Ký tên và đóng dấu)'))
      ),
      h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end',marginTop:'1.5rem'}},

    }},

      h(F,{label:'Giờ giao'},h('input',{value:f.deliveryTime,onChange:e=>s('deliveryTime',e.target.value),placeholder:'08:00'})),
      h(F,{label:'Trạng thái'},h('select',{value:f.status,onChange:e=>s('status',e.target.value),style:{fontSize:12}},
        [['pending','Chờ giao'],['delivering','Đang giao'],['done','Đã giao'],['cancelled','Hủy']].map(([v,l])=>h('option',{key:v,value:v},l))
      )),

      h(F,{label:'Công về'},h('input',{type:'number',min:0,step:.5,value:f.workReturn,onChange:e=>s('workReturn',e.target.value),placeholder:'0'})),
      h(F,{label:'Chú ý / Ghi chú'},h('input',{value:f.note,onChange:e=>s('note',e.target.value),placeholder:'Ghi chú...'})),
    ),

      h('div',{style:{fontSize:12,color:totalWeight>0?'var(--pri)':'var(--tx2)'}},totalWeight>0?'Tổng KL hóa đơn: '+totalWeight.toFixed(2)+' kg':'')
    ),
    f.lines.map(l=>h(OrderDetailLine,{key:l.id,line:l,products,onChange:data=>updLine(l.id,data),onRemove:()=>delLine(l.id)})),

  );
}

function PrintByCustomerModal({orders,customers,products,company,onClose}) {
  const [custId,sCust]=useState('');
  const [df,sdf]=useState('');
  const [dt,sdt]=useState('');
  const parseD=s=>{if(!s)return null;const[d,m,y]=s.split('/');return new Date(y,m-1,d);};
  const inRange=d=>{
    const dt2=parseD(d);if(!dt2)return false;
    const f=df?parseD(df):null;const t=dt?parseD(dt):null;
    if(f&&dt2<f)return false;if(t&&dt2>t)return false;return true;
  };

    o.status!=='cancelled'&&

  const doPrint=()=>{

          '<div><span style="color:#666">Khách hàng:</span> <strong>'+(o.customer||'')+'</strong></div>'+
          '<div><span style="color:#666">Địa điểm:</span> <strong>'+(o.pointName||o.address||'')+'</strong></div>'+
          '<div><span style="color:#666">Ngày giao:</span> <strong>'+o.deliveryDate+'</strong></div>'+
          '<div><span style="color:#666">Giờ giao:</span> <strong>'+(o.deliveryTime||'')+'</strong></div>'+
          (o.note?'<div style="grid-column:span 2"><span style="color:#666">Ghi chú:</span> '+o.note+'</div>':'')+
        '</div>'+
        '<table style="width:100%;border-collapse:collapse;margin-bottom:16px">'+

          '</table>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-top:30px;text-align:center">'+
          '<div><div style="font-weight:600;margin-bottom:40px">Người giao hàng</div><div style="border-top:1px solid #999;padding-top:4px;font-size:11px;color:#666">Ký và ghi rõ họ tên</div></div>'+

        h('i',{className:'ti ti-file-invoice',style:{color:'var(--pri)',marginRight:6}}),
        h('strong',null,filtered.length+' phiếu'),
        ' — '+filtered.reduce((s,o)=>s+(o.lines||[]).length,0)+' dòng sản phẩm'
      ),
      h('div',{style:{maxHeight:200,overflowY:'auto',marginBottom:'1rem'}},

          )),
          h('tbody',null,filtered.map(o=>h('tr',{key:o.id},
            h('td',{style:{padding:'4px 8px',color:'var(--pri)',fontWeight:500}},o.id),
            h('td',{style:{padding:'4px 8px'}},o.deliveryDate),
            h('td',{style:{padding:'4px 8px',fontWeight:500}},o.pointName||'—'),
            h('td',{style:{padding:'4px 8px'}},o.deliveryTime||'—'),

      h(Row,null,
        h('button',{onClick:onClose},'Hủy'),
        h('button',{className:'bp',onClick:doPrint,style:{padding:'8px 20px'}},h('i',{className:'ti ti-printer',style:{fontSize:15}}),' In '+filtered.length+' phiếu')
      )

      h(Row,null,h('button',{onClick:onClose},'Đóng'))
    )
  );
}

function DeliveryOrdersTab({orders,setOrders,customers,products,quotes,employees,currentUser,trips,setTrips,company}){
  const[modal,sm]=useState(null);const[edit,se]=useState(null);const[print,spr]=useState(null);const[q,sq]=useState('');const[filter,sf]=useState('all');let oSeq=orders.length+1;
  const save=d=>{if(edit)setOrders(p=>p.map(x=>x.id===edit.id?d:x));else{const id='DGH'+String(oSeq++).toString().padStart(4,'0');setOrders(p=>[...p,{...d,id,createdAt:fmtDate()}]);}sm(null);se(null);};
  const del=id=>{
    const o=orders.find(x=>x.id===id);
    if(o?.tripId)setTrips(p=>p.map(t=>t.id===o.tripId?{...t,orderIds:t.orderIds.filter(x=>x!==id)}:t));
    if(confirm('Xóa đơn hàng?'))setOrders(p=>p.filter(x=>x.id!==id));
  };
  const sts=[['all','Tất cả'],['pending','Chờ giao'],['delivering','Đang giao'],['done','Đã giao'],['cancelled','Hủy']];
  const list=orders.filter(x=>(filter==='all'||x.status===filter)&&(!q||x.customer.toLowerCase().includes(q.toLowerCase())||x.id.toLowerCase().includes(q.toLowerCase())));
  return h('div',null,
    h('div',{className:'ptitle'},h('i',{className:'ti ti-truck-delivery',style:{fontSize:20}}),'Đơn giao hàng'),
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem',flexWrap:'wrap',gap:8}},
      h('div',{style:{display:'flex',gap:5,flexWrap:'wrap'}},sts.map(([v,l])=>h('button',{key:v,className:'pill'+(filter===v?' on':''),onClick:()=>sf(v)},l+' ('+(v==='all'?orders.length:orders.filter(x=>x.status===v).length)+')'))),
      h('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
        h(SearchBar,{value:q,onChange:sq,placeholder:'Tìm đơn hàng...'}),
        h(ExportBtn,{onClick:()=>{
          // Flatten orders + lines for Excel export
          const rows=[];
          list.forEach(o=>{
            if(!o.lines||o.lines.length===0){
              rows.push({'Mã đơn':o.id,'Khách hàng':o.customer,'Ngày giao':o.deliveryDate,'Giờ giao':o.deliveryTime||'','Điểm giao':o.pointName||'','Công đi':o.workOut||0,'Công về':o.workReturn||0,'Trạng thái':o.status,'Ghi chú đơn':o.note||'','Sản phẩm':'','ĐVT':'','SL sản xuất':0,'SL hóa đơn':0,'Ca SX':'','Ghi chú dòng':''});
            } else {
              o.lines.forEach((l,i)=>{
                rows.push({'Mã đơn':i===0?o.id:'','Khách hàng':i===0?o.customer:'','Ngày giao':i===0?o.deliveryDate:'','Giờ giao':i===0?(o.deliveryTime||''):'','Điểm giao':i===0?(o.pointName||''):'','Công đi':i===0?(o.workOut||0):0,'Công về':i===0?(o.workReturn||0):0,'Trạng thái':i===0?o.status:'','Ghi chú đơn':i===0?(o.note||''):'',' Sản phẩm':l.productName||'','ĐVT':l.unit||'','SL sản xuất':l.qtyProd||0,'SL hóa đơn':l.qtyInvoice||0,'Ca SX':l.shift==='night'?'Ca đêm':'Ca ngày','Ghi chú dòng':l.note||''});
              });
            }
          });
          const ws=XLSX.utils.json_to_sheet(rows);
          const wb=XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb,ws,'Don giao hang');
          XLSX.writeFile(wb,'Don_giao_hang_'+fmtDate().split('/').join('-')+'.xlsx');
        }}),
        h(ImportBtn,{onFile:rows=>{
          // Group rows by Mã đơn to reconstruct orders
          const orderMap={};
          rows.forEach(r=>{
            const id=(r['Mã đơn']||'').toString().trim();
            if(id){
              // New order header
              const seq=Object.keys(orderMap).length+1;
              orderMap[id]={
                id:id||('DGH'+String(seq).padStart(4,'0')),
                customer:r['Khách hàng']||'',custId:'',
                deliveryDate:r['Ngày giao']||fmtDate(),
                deliveryTime:r['Giờ giao']||'',
                address:r['Địa chỉ']||'',
                pointName:r['Điểm giao']||'',ptId:'',
                workOut:r['Công đi']||0,workReturn:r['Công về']||0,
                status:r['Trạng thái']||'pending',
                note:r['Ghi chú đơn']||'',
                lines:[],createdAt:fmtDate(),updatedAt:fmtDT()
              };
              // Find custId
              const cust=customers.find(c=>c.name===r['Khách hàng']);
              if(cust){orderMap[id].custId=cust.id;}
            }
            // Add line to latest order
            const latestId=id||Object.keys(orderMap)[Object.keys(orderMap).length-1];
            const sp=r[' Sản phẩm']||r['Sản phẩm']||'';
            if(latestId&&orderMap[latestId]&&sp){
              const prod=products.find(p=>p.name===sp);
              orderMap[latestId].lines.push({
                id:uid(),
                productId:prod?prod.id:'',productName:sp,
                unit:r['ĐVT']||'',
                weightPerUnit:prod?prod.weightPerUnit||0:0,
                qtyProd:Number(r['SL sản xuất'])||0,
                qtyInvoice:Number(r['SL hóa đơn'])||0,
                shift:(r['Ca SX']||'').includes('đêm')?'night':'day',
                note:r['Ghi chú dòng']||''
              });
            }
          });
          const imported=Object.values(orderMap).filter(o=>o.customer);
          setOrders(p=>{
            const map={};p.forEach(x=>{map[x.id]=x;});
            imported.forEach(x=>{map[x.id]=map[x.id]?{...map[x.id],...x,lines:x.lines.length?x.lines:map[x.id].lines}:x;});
            return Object.values(map);
          });
          alert('Đã nhập/cập nhật '+imported.length+' đơn hàng');
        }}),
        modal==='print'&&h(PrintByCustomerModal,{orders,customers,products,company,onClose:()=>sm(null)}),
        h('button',{
          onClick:()=>sm('print'),
          style:{padding:'6px 12px',fontSize:12,display:'flex',alignItems:'center',gap:5,background:'#185FA5',color:'#fff',border:'none',borderRadius:'var(--r)',cursor:'pointer'}
        },h('i',{className:'ti ti-printer',style:{fontSize:14}}),'In phiếu KH'),
        h('button',{
          title:'Import đơn hàng từ file Excel của khách hàng',
          style:{padding:'6px 12px',fontSize:12,display:'flex',alignItems:'center',gap:5,background:'var(--pri3)',color:'#fff',border:'none',borderRadius:'var(--r)',cursor:'pointer'},
          onClick:()=>{
            const inp=document.createElement('input');
            inp.type='file';inp.accept='.xlsx,.xls';
            inp.onchange=e=>{
              const file=e.target.files[0];if(!file)return;
              const reader=new FileReader();
              reader.onload=ev=>{
                const wb=XLSX.read(ev.target.result,{type:'binary'});
                const ws=wb.Sheets[wb.SheetNames[0]];
                const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
                // Parse rows: [date, point, productStr, qtyHD, _, time]
                const orderMap={};
                raw.forEach(r=>{
                  if(!r[1]||!r[2]) return;
                  // Format date
                  let dStr='';
                  if(r[0] instanceof Date||typeof r[0]==='number'){
                    const d=typeof r[0]==='number'?new Date(Math.round((r[0]-25569)*86400*1000)):r[0];
                    const excelDate=XLSX.SSF.parse_date_code(r[0]);
                    if(excelDate){dStr=String(excelDate.d).padStart(2,'0')+'/'+String(excelDate.m).padStart(2,'0')+'/'+excelDate.y;}
                    else{dStr=String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
                  } else if(typeof r[0]==='string') dStr=r[0];
                  const point=(r[1]||'').toString().trim();
                  const time=(r[5]||r[4]||'').toString().trim();
                  const key=dStr+'|'+point+'|'+time;
                  if(!orderMap[key]){
                    orderMap[key]={
                      id:'DGH'+String(Date.now()+Object.keys(orderMap).length).slice(-8),
                      deliveryDate:dStr,pointName:point,pointId:'',
                      customer:'',customerId:'',address:'',
                      deliveryTime:time,status:'pending',
                      note:'',workOut:0,workReturn:0,
                      lines:[],createdAt:fmtDate(),updatedAt:fmtDT()
                    };
                    // Find matching point in customers
                    customers.forEach(c=>(c.points||[]).forEach(pt=>{
                      if(pt.name.trim().toUpperCase()===point.toUpperCase()){
                        orderMap[key].pointId=pt.id;
                        orderMap[key].pointName=pt.name;
                        orderMap[key].customer=c.name;
                        orderMap[key].customerId=c.id;
                        orderMap[key].address=pt.address||'';
                      }
                    }));
                  }
                  // Parse product
                  const {name,unit}=parseProductStr((r[2]||'').toString());
                  const qtyHD=parseFloat(r[3])||0;
                  // Find product in catalog
                  const prod=products.find(p=>p.name.toUpperCase()===name.toUpperCase())||{};
                  orderMap[key].lines.push({
                    id:uid(),productId:prod.id||'',productName:name,
                    unit:unit,weightPerUnit:prod.weightPerUnit||0,
                    qtyProd:qtyHD,qtyInvoice:qtyHD,shift:'day',note:''
                  });
                });
                const newOrders=Object.values(orderMap).filter(o=>o.lines.length>0);
                if(newOrders.length===0){alert('Không đọc được đơn hàng nào!');return;}
                setOrders(p=>[...p,...newOrders]);
                alert('Đã tạo '+newOrders.length+' đơn hàng từ '+newOrders.reduce((s,o)=>s+o.lines.length,0)+' dòng sản phẩm!');

function TripForm({trip,orders,employees,currentUser,onSave,onClose}){
  const drivers=employees.filter(e=>e.role==='driver'||e.dept==='Lái xe');
  const[f,sf]=useState(trip?{...trip}:{driverName:'',driverId:'',deliveryDate:fmtDate(),deliveryTime:'07:00',orderIds:[],note:'',status:'planning'});
  const s=(k,v)=>sf(p=>({...p,[k]:v}));
  const availOrders=orders.filter(o=>o.status==='pending'||(trip&&trip.orderIds.includes(o.id)));
  const toggle=id=>sf(p=>({...p,orderIds:p.orderIds.includes(id)?p.orderIds.filter(x=>x!==id):[...p.orderIds,id]}));
  const totalW=f.orderIds.reduce((sum,oid)=>{const o=orders.find(x=>x.id===oid);if(!o||!o.lines)return sum;return sum+o.lines.reduce((s,l)=>{if(!l.weightPerUnit)return s;return s+numFmt(l.weightPerUnit)*numFmt(l.qtyInvoice);},0);},0);
  const submit=()=>{
    if(!f.driverName){alert('Chọn hoặc nhập tên lái xe!');return;}
    if(f.orderIds.length===0){alert('Chọn ít nhất 1 đơn hàng!');return;}
    onSave({...f,totalWeight:totalW,updatedBy:currentUser.name,updatedAt:fmtDT()});
  };
  return h(Modal,{title:trip?'Sửa chuyến '+trip.id:'Tạo chuyến giao hàng',onClose},
    h('div',{className:'g2'},
      h(F,{label:'Lái xe *'},h('select',{value:f.driverId,onChange:e=>{const emp=employees.find(x=>x.id===e.target.value);sf(p=>({...p,driverId:e.target.value,driverName:emp?emp.name:p.driverName}));},style:{marginBottom:0}},
        h('option',{value:''},'— Chọn từ danh sách —'),drivers.map(e=>h('option',{key:e.id,value:e.id},e.name))
      )),
      h(F,{label:'Hoặc nhập tên lái xe'},h('input',{value:f.driverName,onChange:e=>s('driverName',e.target.value),placeholder:'Tên lái xe...'})),
    ),
    h('div',{className:'g3'},
      h(F,{label:'Ngày giao'},h('input',{value:f.deliveryDate,onChange:e=>s('deliveryDate',e.target.value),placeholder:'DD/MM/YYYY'})),
      h(F,{label:'Giờ khởi hành'},h('input',{value:f.deliveryTime,onChange:e=>s('deliveryTime',e.target.value),placeholder:'07:00'})),
      h(F,{label:'Trạng thái'},h('select',{value:f.status,onChange:e=>s('status',e.target.value)},
        [['planning','Lên kế hoạch'],['active','Đang giao'],['completed','Hoàn thành']].map(([v,l])=>h('option',{key:v,value:v},l))
      )),
    ),
    h(F,{label:'Ghi chú'},h('textarea',{value:f.note,onChange:e=>s('note',e.target.value),rows:2})),
    h('div',{className:'divider'}),
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
      h('div',{style:{fontWeight:500,fontSize:13,color:'var(--pri3)'}},'Chọn đơn hàng'),
      totalW>0&&h('div',{style:{fontSize:13,fontWeight:500,color:'var(--pri)'}},'Tổng KL: '+totalW.toFixed(2)+' kg')
    ),
    h('div',{style:{maxHeight:250,overflowY:'auto',border:'.5px solid var(--bd)',borderRadius:'var(--r)',padding:8}},
      availOrders.length?availOrders.map(o=>{
        const checked=f.orderIds.includes(o.id);
        const w=o.lines?o.lines.reduce((s,l)=>s+(l.weightPerUnit||0)*numFmt(l.qtyInvoice),0):0;
        return h('label',{key:o.id,style:{display:'flex',alignItems:'center',gap:10,padding:'7px 8px',borderRadius:'var(--r)',cursor:'pointer',background:checked?'var(--bbg,#E6F1FB)':'',marginBottom:3}},

}
function TripsTab({trips,setTrips,orders,setOrders,employees,currentUser}){
  const[modal,sm]=useState(null);const[edit,se]=useState(null);const[open,so]=useState(null);
  let tSeq=trips.length+1;
  const save=d=>{
    if(edit){
      const old=trips.find(t=>t.id===edit.id);
      if(old){setOrders(p=>p.map(o=>old.orderIds.includes(o.id)&&!d.orderIds.includes(o.id)?{...o,tripId:null,status:'pending'}:o));}
      setTrips(p=>p.map(t=>t.id===edit.id?{...edit,...d}:t));
    } else {
      const id='CH'+String(tSeq++).toString().padStart(3,'0');
      setTrips(p=>[...p,{...d,id,createdAt:fmtDate()}]);
    }
    setOrders(p=>p.map(o=>d.orderIds.includes(o.id)?{...o,tripId:d.id||(edit?edit.id:'')}:o));
    sm(null);se(null);
  };
  const del=id=>{
    const t=trips.find(x=>x.id===id);
    if(t)setOrders(p=>p.map(o=>t.orderIds.includes(o.id)?{...o,tripId:null,status:'pending'}:o));
    if(confirm('Xóa chuyến giao?'))setTrips(p=>p.filter(x=>x.id!==id));
  };
  const updStatus=(id,status)=>{
    setTrips(p=>p.map(t=>t.id===id?{...t,status}:t));
    const t=trips.find(x=>x.id===id);
    if(t){
      if(status==='active')setOrders(p=>p.map(o=>t.orderIds.includes(o.id)?{...o,status:'delivering'}:o));
      if(status==='completed')setOrders(p=>p.map(o=>t.orderIds.includes(o.id)?{...o,status:'done'}:o));
    }
  };
  return h('div',null,
    h('div',{className:'ptitle'},h('i',{className:'ti ti-steering-wheel',style:{fontSize:20}}),'Chuyến giao hàng'),
    h('div',{style:{display:'flex',justifyContent:'flex-end',marginBottom:'1rem'}},
      h(AddBtn,{onClick:()=>{se(null);sm('f')},label:'Tạo chuyến mới'})
    ),
    trips.length?h('div',{style:{display:'flex',flexDirection:'column',gap:'1rem'}},
      trips.map(trip=>{
        const tripOrders=orders.filter(o=>trip.orderIds.includes(o.id));
        const isOpen=open===trip.id;
        const totalW=trip.totalWeight||tripOrders.reduce((s,o)=>s+(o.lines?o.lines.reduce((ss,l)=>ss+(l.weightPerUnit||0)*numFmt(l.qtyInvoice),0):0),0);
        return h('div',{key:trip.id,className:'card',style:{padding:0,overflow:'hidden'}},
          h('div',{style:{display:'flex',alignItems:'center',gap:12,padding:'1rem 1.25rem',cursor:'pointer'},onClick:()=>so(isOpen?null:trip.id)},
            h('i',{className:'ti ti-chevron-'+(isOpen?'up':'down'),style:{fontSize:16,color:'var(--tx2)',flexShrink:0}}),
            h('div',{style:{flex:1}},
              h('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:4}},
                h('span',{style:{fontWeight:500}},trip.id),
                h('span',{style:{color:'var(--tx2)'}},trip.driverName||'—'),
                h(StatusBadge,{s:trip.status})
              ),
              h('div',{style:{display:'flex',gap:16,fontSize:12,color:'var(--tx2)',flexWrap:'wrap'}},
                h('span',null,h('i',{className:'ti ti-calendar',style:{fontSize:12,marginRight:3}}),trip.deliveryDate+(trip.deliveryTime?' '+trip.deliveryTime:'')),
                h('span',null,h('i',{className:'ti ti-package',style:{fontSize:12,marginRight:3}}),tripOrders.length+' đơn'),
                totalW>0&&h('span',{style:{color:'var(--pri)',fontWeight:500}},h('i',{className:'ti ti-weight',style:{fontSize:12,marginRight:3}}),totalW.toFixed(2)+' kg')
              )
            ),
            h('div',{style:{display:'flex',gap:4},onClick:e=>e.stopPropagation()},
              trip.status==='planning'&&h('button',{onClick:()=>updStatus(trip.id,'active'),style:{fontSize:11,padding:'4px 10px',background:'#EAF3DE',color:'#3B6D11',border:'none',borderRadius:4}},'Bắt đầu giao'),
              trip.status==='active'&&h('button',{onClick:()=>updStatus(trip.id,'completed'),style:{fontSize:11,padding:'4px 10px',background:'#E1F5EE',color:'#0F6E56',border:'none',borderRadius:4}},'Hoàn thành'),
              h('button',{className:'bi',onClick:()=>{se(trip);sm('f')}},h('i',{className:'ti ti-edit',style:{fontSize:15}})),
              h('button',{className:'bi',onClick:()=>del(trip.id),style:{color:'#A32D2D'}},h('i',{className:'ti ti-trash',style:{fontSize:15}}))
            )
          ),
          isOpen&&h('div',{style:{borderTop:'.5px solid var(--bd)',padding:'1rem 1.25rem'}},
            trip.note&&h('div',{style:{fontSize:13,color:'var(--tx2)',marginBottom:8}},'Ghi chú: '+trip.note),
            h('div',{style:{fontWeight:500,fontSize:12,color:'var(--tx2)',marginBottom:8}},'Đơn hàng trong chuyến:'),
            tripOrders.length?h('div',{className:'tw'},
              h('table',null,
                h('thead',null,h('tr',null,...['Mã đơn','Khách hàng','Địa chỉ','Hàng hóa','Khối lượng','Trạng thái'].map(c=>h('th',{key:c},c)))),
                h('tbody',null,tripOrders.map(o=>{
                  const w=o.lines?o.lines.reduce((s,l)=>s+(l.weightPerUnit||0)*numFmt(l.qtyInvoice),0):0;
                  return h('tr',{key:o.id},
                    h('td',null,h('span',{style:{color:'var(--pri)',fontWeight:500}},o.id)),
                    h('td',null,o.customer),
                    h('td',null,h('span',{style:{color:'var(--tx2)',display:'block',maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},o.address||'—')),
                    h('td',null,(o.lines||[]).length+' mặt hàng'),
                    h('td',null,w>0?h('span',{style:{fontWeight:500,color:'var(--pri)'}},w.toFixed(2)+' kg'):'—'),
                    h('td',null,h(StatusBadge,{s:o.status}))
                  );
                }))
              )
            ):h('p',{style:{fontSize:13,color:'var(--tx2)'}},'Chưa có đơn hàng.')
          )
        );
      })
    ):h('div',{style:{textAlign:'center',padding:'3rem',color:'var(--tx2)',background:'#fff',borderRadius:'var(--rl)',border:'.5px solid var(--bd)'}},
      h('i',{className:'ti ti-steering-wheel',style:{fontSize:56,display:'block',marginBottom:'1rem',color:'var(--pri2)'}}),
      'Chưa có chuyến giao hàng nào.'
    ),
    modal==='f'&&h(TripForm,{trip:edit,orders,employees,currentUser,onSave:save,onClose:()=>{sm(null);se(null);}})
  );
}

/* ─── Tổng hợp sản xuất ─── */
function ProductionSummaryTab({orders,products}){
  const[date,setDate]=useState(fmtDate());
  const[shift,setShift]=useState('all');

  // Aggregate from delivery orders
  const dayOrders=orders.filter(o=>o.deliveryDate===date&&o.status!=='cancelled');
  const aggMap={};
  dayOrders.forEach(o=>{
    (o.lines||[]).forEach(l=>{
      if(!l.productId)return;
      const key=l.productId+'_'+l.shift;
      if(!aggMap[key])aggMap[key]={productId:l.productId,productName:l.productName,unit:l.unit,shift:l.shift,qtyProd:0,qtyInvoice:0,orders:[]};
      aggMap[key].qtyProd+=numFmt(l.qtyProd);
      aggMap[key].qtyInvoice+=numFmt(l.qtyInvoice);
      aggMap[key].orders.push(o.id);
    });
  });
  const rows=Object.values(aggMap).filter(r=>shift==='all'||r.shift===shift);
  const dayRows=rows.filter(r=>r.shift==='day');
  const nightRows=rows.filter(r=>r.shift==='night');

  return h('div',null,
    h('div',{className:'ptitle'},h('i',{className:'ti ti-clipboard-list',style:{fontSize:20}}),'Tổng hợp sản xuất'),
    h('div',{className:'card',style:{marginBottom:'1.25rem'}},
      h('div',{className:'g3'},
        h(F,{label:'Ngày giao hàng'},h('input',{value:date,onChange:e=>setDate(e.target.value),placeholder:'DD/MM/YYYY'})),
        h(F,{label:'Ca sản xuất'},h('select',{value:shift,onChange:e=>setShift(e.target.value)},
          h('option',{value:'all'},'Tất cả ca'),
          h('option',{value:'day'},'Ca ngày'),
          h('option',{value:'night'},'Ca đêm')
        )),
        h('div',{style:{display:'flex',flexDirection:'column',justifyContent:'flex-end'}},
          h('div',{style:{fontSize:13,color:'var(--tx2)',marginBottom:4}},'Số đơn hàng ngày này'),
          h('div',{style:{fontSize:20,fontWeight:600,color:'var(--pri)'}},dayOrders.length+' đơn')
        )
      )
    ),
    rows.length===0?h('div',{style:{textAlign:'center',padding:'3rem',color:'var(--tx2)',background:'#fff',borderRadius:'var(--rl)',border:'.5px solid var(--bd)'}},
      h('i',{className:'ti ti-clipboard-x',style:{fontSize:56,display:'block',marginBottom:'1rem',color:'var(--pri2)'}}),
      'Không có dữ liệu sản xuất cho ngày '+date
    ):h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1.25rem'}},
      (shift==='all'||shift==='day')&&dayRows.length>0&&h('div',null,
        h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:'1rem'}},
          h('div',{style:{width:10,height:10,borderRadius:'50%',background:'#f8c30f'}}),
          h('span',{style:{fontWeight:600,fontSize:14,color:'var(--pri3)'}},'CA NGÀY'),
          h('span',{style:{fontSize:12,color:'var(--tx2)'}},dayRows.length+' sản phẩm')
        ),
        h('div',{className:'tw'},
          h('table',null,
            h('thead',null,h('tr',null,...['Sản phẩm','ĐVT','SL sản xuất','SL hóa đơn','Đơn hàng'].map(c=>h('th',{key:c},c)))),
            h('tbody',null,dayRows.map((r,i)=>h('tr',{key:i},
              h('td',null,h('div',{style:{fontWeight:500}},r.productName)),
              h('td',null,h('span',{className:'badge',style:{background:'#EAF3DE',color:'#3B6D11'}},r.unit)),
              h('td',null,h('span',{style:{fontSize:16,fontWeight:600,color:'var(--pri)'}},r.qtyProd.toLocaleString())),
              h('td',null,h('span',{style:{fontSize:16,fontWeight:600}},r.qtyInvoice.toLocaleString())),

          h('span',{style:{fontSize:12,color:'var(--tx2)'}},nightRows.length+' sản phẩm')
        ),
        h('div',{className:'tw'},
          h('table',null,
            h('thead',null,h('tr',null,...['Sản phẩm','ĐVT','SL sản xuất','SL hóa đơn','Đơn hàng'].map(c=>h('th',{key:c},c)))),

/* === ERROR BOUNDARY === */
class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  componentDidCatch(e,i){console.error(e,i);}
  render(){
    if(this.state.error){
      const e=this.state.error;
      return h('div',{style:{padding:'2rem',fontFamily:'monospace',background:'#fff',minHeight:'100vh'}},
        h('h2',{style:{color:'#A32D2D',marginBottom:'1rem'}},'LOI RENDER: '+e.message),
        h('pre',{style:{fontSize:11,background:'#f5f5f5',padding:'1rem',borderRadius:4,overflow:'auto',whiteSpace:'pre-wrap'}},e.stack),
        h('p',{style:{marginTop:'1rem',fontSize:13,color:'#666'}},'Chup man hinh nay gui lai de fix!')
      );
    }
    return this.props.children;
  }
}

const PAGE_ACCESS = {
  welcome:      ['admin','manager','staff','driver'],
  company:      ['admin','manager'],
  employees:    ['admin','manager'],
  backup:       ['admin'],
  materials:    ['admin','manager','staff'],
  products:     ['admin','manager','staff'],
  customers:    ['admin','manager','staff'],
  workcats:     ['admin','manager'],
  shifts:        ['admin','manager','staff'],
  quotes:       ['admin','manager','staff'],
  delivery:     ['admin','manager','staff'],
  orderdetail:  ['admin','manager','staff','driver'],
  trips:        ['admin','manager','driver'],
  prodsummary:  ['admin','manager','staff'],
  prodorders:   ['admin','manager','staff'],
  stock:        ['admin','manager','staff'],
  purchase:     ['admin','manager'],
  nccs:         ['admin','manager'],
  purchaseorders:['admin','manager'],
  purchasereport:['admin','manager'],
  salesreport:  ['admin','manager','staff'],
};
// Default permissions by role
function roleDefaults(role) {
  return Object.keys(PAGE_ACCESS).filter(p => PAGE_ACCESS[p].includes(role));
}
// canAccess checks employee's custom permissions first, else falls back to role
function canAccess(role, page, perms) {
  if (perms && perms.length > 0) return perms.includes(page);
  const allowed = PAGE_ACCESS[page];
  return !allowed || allowed.includes(role);
}
// Mức quyền: 'r'=chỉ xem, 'rw'=xem+sửa, 'rwd'=xem+sửa+xóa
function getLvl(role, page, lvls) {
  if (lvls && lvls[page]) return lvls[page];
  // Mặc định theo role
  if (role === 'admin') return 'rwd';
  if (role === 'manager') return 'rwd';
  if (role === 'staff') return 'rw';
  if (role === 'driver') return 'r';
  return 'r';
}
function canWrite(role, page, lvls) { const l=getLvl(role,page,lvls); return l==='rw'||l==='rwd'; }
function canDel(role, page, lvls)   { return getLvl(role,page,lvls)==='rwd'; }

            h('div',{style:{display:'flex',alignItems:'center',gap:5,marginTop:2}},
              h('span',{className:'badge '+({admin:'chip-admin',manager:'chip-manager',staff:'chip-staff',driver:'chip-driver'}[cu.role]||'chip-staff'),style:{fontSize:10}},ROLES[cu.role]||cu.role),
              h('span',{style:{fontSize:11,color:'var(--tx2)'}},cu.dept)
            )
          ),
          h('button',{onClick:()=>setSession(null),style:{fontSize:12,padding:'5px 10px',color:'#A32D2D',borderColor:'#F7C1C1'}},h('i',{className:'ti ti-logout',style:{fontSize:14}}),'Đăng xuất')
        )
      ),
      h('div',{className:'content'},
        !canAccess(cu.role,page,cu.permissions)&&h('div',{style:{textAlign:'center',padding:'4rem 2rem'}},
          h('i',{className:'ti ti-lock',style:{fontSize:64,display:'block',marginBottom:'1rem',color:'#f8c30f'}}),
          h('h2',{style:{fontSize:18,fontWeight:500,marginBottom:8}},'Khong co quyen truy cap'),
          h('p',{style:{fontSize:13,color:'var(--tx2)'}},'Tai khoan cua ban khong co quyen xem trang nay.'),
          h('button',{className:'bp',onClick:()=>setPage('welcome'),style:{marginTop:'1.5rem',padding:'8px 20px',display:'inline-flex'}},'Ve trang chu')
        ),
        canAccess(cu.role,page)&&page==='welcome'&&h(WelcomePage,{emp:cu,company}),
        canAccess(cu.role,'company',cu.permissions)&&page==='company'&&h(CompanySettings,{company,setCompany}),
        canAccess(cu.role,'employees',cu.permissions)&&page==='employees'&&h(EmployeeTab,{employees,setEmployees,cu}),
        canAccess(cu.role,'backup',cu.permissions)&&page==='backup'&&h(BackupTab,{employees,materials,prodCats,products,customers,workcats}),
        canAccess(cu.role,'materials',cu.permissions)&&page==='materials'&&h(MaterialsTab,{materials,setMaterials}),
        canAccess(cu.role,'products',cu.permissions)&&page==='products'&&h(ProductsTab,{products,setProducts,prodCats,setProdCats}),
        canAccess(cu.role,'customers',cu.permissions)&&page==='customers'&&h(CustomersTab,{customers,setCustomers,shifts,cu}),
        canAccess(cu.role,'workcats',cu.permissions)&&page==='workcats'&&h(WorkCatsTab,{workcats,setWorkcats}),
        page==='shifts'&&h(ShiftsTab,{shifts,setShifts}),
        canAccess(cu.role,'quotes',cu.permissions)&&page==='quotes'&&h(QuotesTab,{quotes,setQuotes,customers,products,currentUser:cu}),
        canAccess(cu.role,'delivery',cu.permissions)&&page==='delivery'&&h(DeliveryOrdersTab,{orders,setOrders,customers,products,quotes,employees,currentUser:cu,trips,setTrips,company}),
        canAccess(cu.role,'trips',cu.permissions)&&page==='trips'&&h(TripsTab,{trips,setTrips,orders,setOrders,employees,currentUser:cu}),
        page==='orderdetail'&&h(OrderDetailListTab,{orders,products,customers,shifts}),
        canAccess(cu.role,'prodsummary',cu.permissions)&&page==='prodsummary'&&h(ProductionSummaryTab,{orders,products}),
        canAccess(cu.role,'prodorders',cu.permissions)&&page==='prodorders'&&h(ProdOrdersTab,{prodOrders,setProdOrders,products,currentUser:cu}),
        canAccess(cu.role,'stock',cu.permissions)&&page==='stock'&&h(StockTab,{stock,setStock,products,currentUser:cu}),
        wips.includes(page)&&h(PlaceholderTab,{title:PTITLES[page],icon:PICONS[page]||'ti-clock'})
      )
    )
  );
}

try {
  try {
    ReactDOM.createRoot(document.getElementById('app')).render(
      h(ErrorBoundary, null, h(App))
    );
  } catch(e) {
    document.getElementById('app').innerHTML='<div style="padding:2rem;font-family:monospace"><h2 style="color:#A32D2D">LOI: '+e.message+'</h2><pre style="font-size:11px;margin-top:1rem">'+e.stack+'</pre></div>';
  }
} catch(e) {
  document.getElementById('app').innerHTML = '<div style="padding:2rem;color:#A32D2D;font-family:monospace;background:#fff;min-height:100vh"><h2>Loi render SCF App</h2><p style="margin-top:1rem">'+e.message+'</p><pre style="margin-top:1rem;font-size:11px;opacity:.6">'+e.stack+'</pre></div>';
}


</script>
</body>
</html>
